name: Build Electron Base Project

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (example: v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title shown on GitHub'
        required: true
        default: 'Electron Base Project v1.0.0'
      prerelease:
        description: 'Mark as prerelease'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    env:
      # App env variables (aligned with .env.example)
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./dev.db' }}
      VITE_APP_ENV: production
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://api.example.com' }}
      # Keep unsigned builds stable across CI unless signing secrets are configured.
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Generate CI env files
        shell: bash
        run: |
          cat > .env <<EOF
          DATABASE_URL="${DATABASE_URL}"
          VITE_APP_ENV=${VITE_APP_ENV}
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          EOF

          cat > .env.production <<EOF
          DATABASE_URL="${DATABASE_URL}"
          VITE_APP_ENV=${VITE_APP_ENV}
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          EOF

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build Windows
        if: runner.os == 'Windows'
        run: pnpm run build:win

      - name: Build macOS
        if: runner.os == 'macOS'
        run: pnpm run build:mac

      - name: Build Linux (CI targets)
        if: runner.os == 'Linux'
        run: pnpm run build:linux:ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifacts
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Electron Base Project

          Automated cross-platform build from GitHub Actions.

          ### Included installers

          - Windows: `.exe`
          - macOS: `.dmg`
          - Linux: `.AppImage`, `.deb`

          ### Build metadata

          - Commit: `${{ github.sha }}`
          - Workflow: `${{ github.workflow }}`
          - Run ID: `${{ github.run_id }}`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_name || format('Electron Base Project {0}', github.ref_name) }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
